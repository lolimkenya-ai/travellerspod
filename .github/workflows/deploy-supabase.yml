name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ai-search-recommendations --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy learn-user-preferences --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy fair-view-algorithm --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy moderate-content --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy verify-business --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy ai-content-assistant --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
